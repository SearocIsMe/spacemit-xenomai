# =============================================================================
# extlinux.conf — U-Boot extlinux boot configuration for Milk-V Jupiter (K1)
#
# Placed at: /boot/extlinux/extlinux.conf  (on the FAT32 boot partition)
#
# This file is copied to the SD card by make-full-sdcard-img.sh / flash-sdcard.sh.
#
# NOTE ON console= ORDERING
#   Always list console=tty1 BEFORE console=ttyS0 so that HDMI output is
#   enabled.  Without console=tty1 the kernel routes all output to serial UART
#   only and the HDMI display stays at a static blank cursor.
#
# NOTE ON initrd
#   Bianbu (Ubuntu-based) and some buildroot images use an initramfs.
#   If the base image has an initrd, uncomment the initrd line below and set
#   the correct filename.  Run make-full-sdcard-img.sh — it will print the
#   original extlinux.conf so you can copy the exact initrd path.
#
# NOTE ON root= device
#   buildroot images: root=/dev/mmcblk0p2
#   Bianbu images:    root=UUID=<uuid>  (copy from the original extlinux.conf
#                     shown by make-full-sdcard-img.sh)
# =============================================================================

default EVL
timeout 30
prompt 1

label EVL
    menu label SpacemiT K1 + EVL Xenomai4 kernel
    linux /Image
    fdt /dtbs/spacemit/k1-x_milkv-jupiter.dtb
    # initrd /initrd.img          # uncomment if the base image uses initramfs
    append earlycon=sbi console=tty1 console=ttyS0,115200 root=/dev/mmcblk0p2 rootwait rw
