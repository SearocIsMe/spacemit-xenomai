# =============================================================================
# extlinux.conf — U-Boot extlinux boot configuration for Milk-V Jupiter (K1)
#
# Placed at: /extlinux/extlinux.conf  (on the FAT32 boot partition)
#
# This file is written to the SD card image by make-full-sdcard-img.sh.
# The root= and initrd lines are patched at image-build time by that script
# based on values extracted from the original base image.
#
# BOOT VISIBILITY STRATEGY
# ========================
# console=tty0    — routes kernel messages to the active virtual console
#                   (framebuffer/HDMI).  "tty0" always means "current VT",
#                   which works regardless of DRM driver init order.
# console=ttyS0   — secondary serial console for debug cable access.
# loglevel=7      — show all kernel messages (debug level) during bring-up.
# initcall_debug  — print each initcall as it runs; reveals where boot stalls.
# plymouth.enable=0  — prevent Plymouth from ever starting (avoids Bianbu
#                      splash screen freeze when Weston/GPU is unavailable).
# nosplash        — U-Boot / initrd splash suppression.
# rd.plymouth=0   — dracut/initramfs Plymouth suppression.
# clk_ignore_unused  — prevents unused clock gates from being turned off
#                      (SpacemiT K1 requirement; removing this causes hangs).
# swiotlb=65536   — DMA bounce buffer size for SpacemiT K1 PCIe/USB.
# =============================================================================

default EVL
timeout 30
prompt 1

label EVL
    menu label SpacemiT K1 + EVL Xenomai4 kernel
    linux /Image
    fdt /dtbs/spacemit/k1-x_milkv-jupiter.dtb
    # initrd /initramfs-generic.img    # patched by make-full-sdcard-img.sh if needed
    append earlycon=sbi loglevel=7 initcall_debug plymouth.enable=0 rd.plymouth=0 nosplash console=tty0 console=ttyS0,115200 root=ROOT_PLACEHOLDER rootwait rw clk_ignore_unused swiotlb=65536
